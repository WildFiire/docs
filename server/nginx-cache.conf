# Wildfire Wiki - Nginx cache headers for static assets
# Include this inside your server {} block:
#   include /var/www/wiki/nginx-cache.conf;

# Hashed assets (JS/CSS with content hash in filename) - cache forever
location ~* ^/assets/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Static chunks (also hashed) - VitePress outputs these under /assets/ in dist,
# but keeping this rule ensures they're covered if ever served from /chunks/
location ~* ^/chunks/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Scripts directory (non-hashed, but rarely changes — 7 day cache)
# Covers: /scripts/iconify-icon.min.js and similar
location ~* ^/scripts/.*\.js$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    access_log off;
}

# vp-icons.css (VitePress icon sprite — changes with VitePress upgrades only)
location = /vp-icons.css {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    access_log off;
}

# Icons - 30 day cache (static assets, rarely change)
location ~* ^/icons/.*\.(webp|png|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
    access_log off;
}

# Wallpaper images - 7 day cache with revalidation
location ~* ^/wallpaper/.*\.(webp|png|jpg|jpeg)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    access_log off;
}

# All other images, fonts, and media - 7 day cache
location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    access_log off;
}

# HTML pages - always revalidate so deploys take effect immediately
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
}
