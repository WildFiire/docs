name: Discord Push Notification

on:
  push:
    branches: [ main, develop ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | head -20 | tr '\n' '\n' | sed 's/^/• /' | head -c 900)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get commit stats
        id: stats
        run: |
          ADDITIONS=$(git diff --shortstat HEAD~1 HEAD | grep -o '[0-9]* insertion' | grep -o '[0-9]*' || echo "0")
          DELETIONS=$(git diff --shortstat HEAD~1 HEAD | grep -o '[0-9]* deletion' | grep -o '[0-9]*' || echo "0")
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD | wc -l)
          
          echo "additions=$ADDITIONS" >> $GITHUB_OUTPUT
          echo "deletions=$DELETIONS" >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT

      - name: Get user info
        id: userinfo
        run: |
          # Obținem username-ul
          USERNAME="${{ github.event.head_commit.author.username }}"
          
          if [ -z "$USERNAME" ]; then
            USERNAME="${{ github.actor }}"
          fi
          
          if [ -z "$USERNAME" ]; then
            USERNAME="${{ github.event.pusher.name }}"
          fi
          
          # Construim URL-ul avatarului (metodă simplă și sigură)
          if [ -n "$USERNAME" ]; then
            AVATAR_URL="https://github.com/$USERNAME.png?size=64"
            echo "avatar_url=$AVATAR_URL" >> $GITHUB_OUTPUT
            echo "username=$USERNAME" >> $GITHUB_OUTPUT
            echo "display_name=$USERNAME" >> $GITHUB_OUTPUT
          else
            echo "avatar_url=https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" >> $GITHUB_OUTPUT
            echo "username=unknown" >> $GITHUB_OUTPUT
            echo "display_name=Unknown User" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 256 | head -n1)
          AUTHOR="${{ steps.userinfo.outputs.display_name }}"
          AVATAR="${{ steps.userinfo.outputs.avatar_url }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          COMPARE_URL="${{ github.event.compare }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGED_FILES="${{ steps.changed.outputs.files }}"
          ADDITIONS="${{ steps.stats.outputs.additions }}"
          DELETIONS="${{ steps.stats.outputs.deletions }}"
          FILES_CHANGED="${{ steps.stats.outputs.files_changed }}"

          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_FILES="No file details available"
          fi

          # Culori portocalii
          COLOR="16750848"  # Orange in decimal (0xFFA500)

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "🚀 New Push to $REPO",
              "url": "$COMPARE_URL",
              "color": $COLOR,
              "author": {
                "name": "$AUTHOR",
                "icon_url": "$AVATAR",
                "url": "https://github.com/${{ steps.userinfo.outputs.username }}"
              },
              "fields": [
                {
                  "name": "📝 Commit",
                  "value": "[\\`$SHORT_SHA\\`]($COMMIT_URL) - $COMMIT_MSG",
                  "inline": false
                },
                {
                  "name": "📊 Changes",
                  "value": "➕ +$ADDITIONS  ➖ -$DELETIONS\\n📁 $FILES_CHANGED files",
                  "inline": true
                },
                {
                  "name": "🌿 Branch",
                  "value": "\\`$BRANCH\\`",
                  "inline": true
                },
                {
                  "name": "📂 Changed Files",
                  "value": "\\`\\`\\`$CHANGED_FILES\\`\\`\\`",
                  "inline": false
                }
              ],
              "footer": {
                "text": "Wildfire.ro Documentation • $(date -u +"%Y-%m-%d %H:%M:%S") UTC",
                "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
              }
            }]
          }
          EOF
          )

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"