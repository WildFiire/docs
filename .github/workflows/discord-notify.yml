name: рџљЂ VitePress Deploy & Notifications

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ia tot istoricul pentru commit logs
      
      - name: рџ“¦ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: рџ”§ Install dependencies
        run: npm ci
      
      - name: рџ“ќ Get commit info
        id: commit-info
        run: |
          # Ultimele 5 commit-uri
          COMMIT_LOG=$(git log -5 --pretty=format:"%h - %s (%an)" | sed 's/"/\\"/g')
          echo "commit_log<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Autorul
          AUTHOR_NAME=$(git log -1 --pretty=format:"%an")
          AUTHOR_EMAIL=$(git log -1 --pretty=format:"%ae")
          echo "author_name=$AUTHOR_NAME" >> $GITHUB_OUTPUT
          echo "author_email=$AUTHOR_EMAIL" >> $GITHUB_OUTPUT
      
      - name: рџ“‚ Get changed files
        id: changed-files
        run: |
          # Toate fiИ™ierele modificate Г®n ultimul commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          TOTAL_FILES=$(echo "$CHANGED_FILES" | wc -l)
          
          # AratДѓ pГўnДѓ la 100 de fiИ™iere
          if [ $TOTAL_FILES -le 100 ]; then
            FILE_LIST=$(echo "$CHANGED_FILES" | sed 's/^/вЂў /' | sed 's/"/\\"/g')
          else
            FILE_LIST=$(echo "$CHANGED_FILES" | head -100 | sed 's/^/вЂў /' | sed 's/"/\\"/g')
            FILE_LIST="$FILE_LIST\n\nвЂў ... И™i $((TOTAL_FILES - 100)) fiИ™iere"
          fi
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILE_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "total=$TOTAL_FILES" >> $GITHUB_OUTPUT
      
      - name: рџЏ—пёЏ Build VitePress
        id: build
        continue-on-error: true
        run: |
          # Build cu capturДѓ de erori
          npm run docs:build 2>&1 | tee build.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          
          # Extrage erorile dacДѓ existДѓ
          if [ $? -ne 0 ]; then
            ERRORS=$(grep -E "error|Error|ERROR|failed|Failed" build.log | tail -50 | sed 's/"/\\"/g')
            echo "errors<<EOF" >> $GITHUB_OUTPUT
            echo "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            # Prima eroare cu linia exactДѓ
            FIRST_ERROR=$(grep -E "error|Error|ERROR" build.log | head -1 | sed 's/"/\\"/g')
            echo "first_error=$FIRST_ERROR" >> $GITHUB_OUTPUT
          fi
      
      - name: рџљЂ Deploy to VPS
        if: steps.build.outputs.exit_code == 0
        id: deploy
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # AdaugДѓ host la known_hosts
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          
          # Deploy cu rsync
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            docs/.vitepress/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }} 2>&1 | tee deploy.log
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            DEPLOY_ERROR=$(cat deploy.log | grep -i error | tail -20 | sed 's/"/\\"/g')
            echo "error<<EOF" >> $GITHUB_OUTPUT
            echo "$DEPLOY_ERROR" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      
      - name: рџ“ў Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          AUTHOR="${{ steps.commit-info.outputs.author_name }}"
          COMMIT_LOG="${{ steps.commit-info.outputs.commit_log }}"
          FILES_CHANGED="${{ steps.changed-files.outputs.files }}"
          TOTAL_FILES="${{ steps.changed-files.outputs.total }}"
          BUILD_EXIT="${{ steps.build.outputs.exit_code }}"
          BUILD_ERROR="${{ steps.build.outputs.first_error }}"
          DEPLOY_STATUS="${{ steps.deploy.outputs.status }}"
          
          # DeterminДѓ statusul final
          if [ "$BUILD_EXIT" == "0" ] && [ "$DEPLOY_STATUS" == "success" ]; then
            STATUS="вњ… SUCCESS"
            COLOR="3066993"
            TITLE="вњ… Deployment Successful"
          elif [ "$BUILD_EXIT" != "0" ]; then
            STATUS="вќЊ BUILD FAILED"
            COLOR="15158332"
            TITLE="вќЊ Build Failed"
          else
            STATUS="вљ пёЏ DEPLOY FAILED"
            COLOR="15105570"
            TITLE="вљ пёЏ Deployment Failed"
          fi
          
          # ConstruieИ™te descrierea Г®n funcИ›ie de status
          if [ "$BUILD_EXIT" != "0" ]; then
            DESCRIPTION="**рџ”Ё Build Error:**\n\`\`\`\n$BUILD_ERROR\n\`\`\`\n**рџ“ќ Check logs above for details**"
          elif [ "$DEPLOY_STATUS" != "success" ]; then
            DESCRIPTION="**вљ пёЏ Deploy Error:**\n\`\`\`\n${{ steps.deploy.outputs.error }}\n\`\`\`\n**вњ… Build was successful, but deployment to VPS failed**"
          else
            DESCRIPTION="**вњ… Build successful**\n**вњ… Deployed to VPS**\n\n**рџ“Ѓ Total files changed:** $TOTAL_FILES"
          fi
          
          # Trimite embed-ul
          jq -n \
            --arg title "$TITLE" \
            --arg color "$COLOR" \
            --arg status "$STATUS" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg commit_sha "[$SHORT_SHA](https://github.com/$REPO/commit/$COMMIT_SHA)" \
            --arg author "$AUTHOR" \
            --arg timestamp "$TIMESTAMP" \
            --arg commit_log "$COMMIT_LOG" \
            --arg files "$FILES_CHANGED" \
            --arg total_files "$TOTAL_FILES" \
            --arg description "$DESCRIPTION" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                description: $description,
                fields: [
                  {
                    name: "рџ“¦ Repository",
                    value: $repo,
                    inline: true
                  },
                  {
                    name: "рџЊї Branch",
                    value: $branch,
                    inline: true
                  },
                  {
                    name: "рџ“ќ Commit",
                    value: $commit_sha,
                    inline: true
                  },
                  {
                    name: "рџ‘¤ Author",
                    value: $author,
                    inline: true
                  },
                  {
                    name: "рџ’¬ Commit Message",
                    value: ($commit_msg | if length > 100 then .[0:100] + "..." else . end),
                    inline: false
                  },
                  {
                    name: "рџ“њ Last 5 Commits",
                    value: "```\n" + $commit_log + "\n```",
                    inline: false
                  },
                  {
                    name: "рџ“Ѓ Changed Files (\($total_files\) files)",
                    value: "```\n" + $files + "\n```",
                    inline: false
                  }
                ],
                footer: {
                  text: "VitePress Deploy вЂў " + $status,
                  icon_url: "https://vitepress.dev/vitepress-logo-large.png"
                },
                timestamp: $timestamp
              }]
            }' | curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d @-
      
      - name: рџ“ў Send Error Details (if build failed)
        if: steps.build.outputs.exit_code != 0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FULL_ERRORS="${{ steps.build.outputs.errors }}"
          
          jq -n \
            --arg errors "$FULL_ERRORS" \
            '{
              embeds: [{
                title: "рџ”Ќ Detailed Build Errors",
                color: 15158332,
                description: "```\n" + ($errors | if length > 1900 then .[0:1900] + "\n... (truncated)" else . end) + "\n```",
                footer: {
                  text: "Check the full log in GitHub Actions"
                }
              }]
            }' | curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d @-