name: Discord Push Notification

on:
  push:
    branches: [ main, develop ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | head -20 | tr '\n' '\n' | sed 's/^/• /' | head -c 900)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get user info from GitHub API
        id: userinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.event.head_commit.author.username }}"
          
          if [ -z "$USERNAME" ]; then
            USERNAME="${{ github.actor }}"
          fi
          
          if [ -z "$USERNAME" ]; then
            USERNAME="${{ github.event.pusher.name }}"
          fi
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          
          if [ -n "$USERNAME" ]; then
            RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/users/$USERNAME")
            
            AVATAR_URL=$(echo "$RESPONSE" | jq -r '.avatar_url // empty')
            NAME=$(echo "$RESPONSE" | jq -r '.name // empty')
            
            if [ -n "$AVATAR_URL" ]; then
              echo "avatar_url=$AVATAR_URL" >> $GITHUB_OUTPUT
            else
              echo "avatar_url=https://github.com/$USERNAME.png?size=64" >> $GITHUB_OUTPUT
            fi
            
            if [ -n "$NAME" ] && [ "$NAME" != "null" ]; then
              echo "display_name=$NAME" >> $GITHUB_OUTPUT
            else
              echo "display_name=$USERNAME" >> $GITHUB_OUTPUT
            fi
          else
            echo "avatar_url=https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" >> $GITHUB_OUTPUT
            echo "display_name=Unknown User" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 256 | sed 's/"/\\"/g')
          AUTHOR="${{ steps.userinfo.outputs.display_name }}"
          AVATAR="${{ steps.userinfo.outputs.avatar_url }}"
          USERNAME="${{ steps.userinfo.outputs.username }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          COMPARE_URL="${{ github.event.compare }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGED_FILES="${{ steps.changed.outputs.files }}"

          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_FILES="No file details available"
          fi

          # Escape pentru caracterele speciale
          CHANGED_FILES_ESCAPED=$(echo "$CHANGED_FILES" | sed 's/"/\\"/g')

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 New Push to \`$REPO\`\",
                \"url\": \"$COMPARE_URL\",
                \"color\": 16750848,
                \"author\": {
                  \"name\": \"$AUTHOR\",
                  \"icon_url\": \"$AVATAR\",
                  \"url\": \"https://github.com/$USERNAME\"
                },
                \"fields\": [
                  {
                    \"name\": \"📝 Commit\",
                    \"value\": \"[\`$SHORT_SHA\`]($COMMIT_URL)\n$COMMIT_MSG\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"👤 Author\",
                    \"value\": \"$AUTHOR\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"🌿 Branch\",
                    \"value\": \"\`$BRANCH\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"📁 Files\",
                    \"value\": \"\`\`\`$CHANGED_FILES_ESCAPED\`\`\`\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Wildfire.ro Documentation\"
                },
                \"timestamp\": \"$TIMESTAMP\"
              }]
            }"