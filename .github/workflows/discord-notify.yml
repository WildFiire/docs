name: Discord Push Notification

on:
  push:
    branches: [ main, develop ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          # Obținem toate fișierele schimbate
          ALL_FILES=$(git diff --name-only HEAD~1 HEAD)
          FILES_COUNT=$(echo "$ALL_FILES" | wc -l)
          
          # Limităm la 25 de fișiere în listă
          if [ $FILES_COUNT -le 25 ]; then
            FILES=$(echo "$ALL_FILES" | sed 's/^/• /' | tr '\n' '\n')
          else
            FILES=$(echo "$ALL_FILES" | head -25 | sed 's/^/• /' | tr '\n' '\n')
            FILES="$FILES\n• ... și $((FILES_COUNT - 25)) fișiere"
          fi
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "files_count=$FILES_COUNT" >> $GITHUB_OUTPUT
          echo "truncated=$([ $FILES_COUNT -gt 25 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Get user info from GitHub API
        id: userinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.event.head_commit.author.username }}"
          
          if [ -z "$USERNAME" ]; then
            USERNAME="${{ github.actor }}"
          fi
          
          if [ -z "$USERNAME" ]; then
            USERNAME="${{ github.event.pusher.name }}"
          fi
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          
          if [ -n "$USERNAME" ]; then
            RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/users/$USERNAME")
            
            AVATAR_URL=$(echo "$RESPONSE" | jq -r '.avatar_url // empty')
            NAME=$(echo "$RESPONSE" | jq -r '.name // empty')
            
            if [ -n "$AVATAR_URL" ]; then
              echo "avatar_url=$AVATAR_URL" >> $GITHUB_OUTPUT
            else
              echo "avatar_url=https://github.com/$USERNAME.png?size=64" >> $GITHUB_OUTPUT
            fi
            
            if [ -n "$NAME" ] && [ "$NAME" != "null" ]; then
              echo "display_name=$NAME" >> $GITHUB_OUTPUT
            else
              echo "display_name=$USERNAME" >> $GITHUB_OUTPUT
            fi
          else
            echo "avatar_url=https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" >> $GITHUB_OUTPUT
            echo "display_name=Unknown User" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_TITLE=$(echo "${{ github.event.head_commit.message }}" | head -n1 | sed 's/"/\\"/g')
          AUTHOR="${{ steps.userinfo.outputs.display_name }}"
          AVATAR="${{ steps.userinfo.outputs.avatar_url }}"
          USERNAME="${{ steps.userinfo.outputs.username }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          COMPARE_URL="${{ github.event.compare }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGED_FILES="${{ steps.changed.outputs.files }}"
          FILES_COUNT="${{ steps.changed.outputs.files_count }}"
          TRUNCATED="${{ steps.changed.outputs.truncated }}"

          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_FILES="No file details available"
          fi

          # Escape pentru caracterele speciale
          CHANGED_FILES_ESCAPED=$(echo "$CHANGED_FILES" | sed 's/"/\\"/g')
          
          # Adăugăm un mesaj dacă lista a fost trunchiată
          if [ "$TRUNCATED" = "true" ]; then
            FILES_DISPLAY="Showing first 25 of $FILES_COUNT files\n\`\`\`$CHANGED_FILES_ESCAPED\`\`\`"
          else
            FILES_DISPLAY="\`\`\`$CHANGED_FILES_ESCAPED\`\`\`"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 New Push to \`$REPO\`\",
                \"url\": \"$COMPARE_URL\",
                \"color\": 16750848,
                \"author\": {
                  \"name\": \"$AUTHOR\",
                  \"icon_url\": \"$AVATAR\",
                  \"url\": \"https://github.com/$USERNAME\"
                },
                \"fields\": [
                  {
                    \"name\": \"⚡ Title\",
                    \"value\": \"$COMMIT_TITLE\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"🌿 Branch\",
                    \"value\": \"\`$BRANCH\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"📝 Commit\",
                    \"value\": \"[\`$SHORT_SHA\`]($COMMIT_URL)\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"✨ Modified Files\",
                    \"value\": \"$FILES_COUNT files changed\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"📁 Changed Files\",
                    \"value\": \"$FILES_DISPLAY\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Wildfire.ro Documentation\"
                },
                \"timestamp\": \"$TIMESTAMP\"
              }]
            }"