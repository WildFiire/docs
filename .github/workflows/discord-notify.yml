name: Discord Push Notification

on:
  push:
    branches: [ main, develop ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ─── 1. Changed files ───────────────────────────────────────────────────
      - name: Get changed files
        id: changed
        run: |
          ALL_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          if [ -z "$ALL_FILES" ]; then
            FILES_COUNT=0
            COL1="No changes detected"
            COL2=""
          else
            FILES_COUNT=$(echo "$ALL_FILES" | wc -l | tr -d ' ')
            SHOWN=$(echo "$ALL_FILES" | head -20)
            TOTAL_SHOWN=$(echo "$SHOWN" | wc -l | tr -d ' ')
            HALF=$(( (TOTAL_SHOWN + 1) / 2 ))

            COL1=$(echo "$SHOWN" | head -n "$HALF" | sed 's/^/• /')
            COL2=$(echo "$SHOWN" | tail -n +"$((HALF + 1))" | sed 's/^/• /')

            if [ "$FILES_COUNT" -gt 20 ]; then
              EXTRA=$((FILES_COUNT - 20))
              COL2=$(printf "%s\n… +%d more" "$COL2" "$EXTRA")
            fi
          fi

          echo "files_count=$FILES_COUNT" >> $GITHUB_OUTPUT
          {
            echo "col1<<ENDCOL1"
            echo "$COL1"
            echo "ENDCOL1"
          } >> $GITHUB_OUTPUT
          {
            echo "col2<<ENDCOL2"
            echo "$COL2"
            echo "ENDCOL2"
          } >> $GITHUB_OUTPUT

      # ─── 2. Author info ─────────────────────────────────────────────────────
      - name: Get user info
        id: userinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.event.head_commit.author.username }}"
          [ -z "$USERNAME" ] && USERNAME="${{ github.actor }}"
          [ -z "$USERNAME" ] && USERNAME="${{ github.event.pusher.name }}"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

          if [ -n "$USERNAME" ]; then
            RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/users/$USERNAME" 2>/dev/null || echo "{}")

            AVATAR_URL=$(echo "$RESPONSE" | jq -r '.avatar_url // empty')
            NAME=$(echo "$RESPONSE" | jq -r '.name // empty')

            if [ -n "$AVATAR_URL" ]; then
              echo "avatar_url=${AVATAR_URL}&s=128" >> $GITHUB_OUTPUT
            else
              echo "avatar_url=https://github.com/${USERNAME}.png?size=128" >> $GITHUB_OUTPUT
            fi

            if [ -n "$NAME" ] && [ "$NAME" != "null" ]; then
              echo "display_name=$NAME" >> $GITHUB_OUTPUT
            else
              echo "display_name=$USERNAME" >> $GITHUB_OUTPUT
            fi
          else
            echo "avatar_url=https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" >> $GITHUB_OUTPUT
            echo "display_name=Unknown User" >> $GITHUB_OUTPUT
          fi

      # ─── 3. Detect job status ────────────────────────────────────────────────
      - name: Set status emoji
        id: status
        run: |
          # Acest step ruleaza mereu - status-ul e intotdeauna success aici
          # (daca workflow-ul a ajuns pana aici, n-a picat nimic)
          echo "emoji=<:online:1498988532629373030>" >> $GITHUB_OUTPUT
          echo "label=success" >> $GITHUB_OUTPUT
          echo "title=<:verificat_orange:1498988540472721408>  Push Deployed Successfully" >> $GITHUB_OUTPUT
          echo "color=16351248" >> $GITHUB_OUTPUT

      # ─── 4. Restore message ID from cache ───────────────────────────────────
      - name: Restore message ID from cache
        uses: actions/cache@v4
        with:
          path: .cache/discord_msg_id
          key: discord-msg-id-${{ github.ref_name }}-v1
          restore-keys: |
            discord-msg-id-${{ github.ref_name }}-
            discord-msg-id-

      - name: Read last message ID
        id: msgid
        run: |
          MSG_FILE=".cache/discord_msg_id"
          if [ -f "$MSG_FILE" ]; then
            LAST_ID=$(cat "$MSG_FILE" | tr -d '[:space:]')
            if [ -n "$LAST_ID" ]; then
              echo "last_id=$LAST_ID" >> $GITHUB_OUTPUT
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "📬 Found cached message ID: $LAST_ID"
            else
              echo "last_id=" >> $GITHUB_OUTPUT
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "last_id=" >> $GITHUB_OUTPUT
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📭 No cached message ID — first run"
          fi

      # ─── 5. Build payload & send / edit ─────────────────────────────────────
      - name: Send or edit Discord notification
        id: discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG:      ${{ github.event.head_commit.message }}
          AUTHOR:          ${{ steps.userinfo.outputs.display_name }}
          AVATAR:          ${{ steps.userinfo.outputs.avatar_url }}
          USERNAME:        ${{ steps.userinfo.outputs.username }}
          BRANCH:          ${{ github.ref_name }}
          REPO:            ${{ github.repository }}
          FULL_SHA:        ${{ github.sha }}
          COMMIT_URL:      ${{ github.event.head_commit.url }}
          COMPARE_URL:     ${{ github.event.compare }}
          FILES_COUNT:     ${{ steps.changed.outputs.files_count }}
          FILES_COL1:      ${{ steps.changed.outputs.col1 }}
          FILES_COL2:      ${{ steps.changed.outputs.col2 }}
          LAST_MSG_ID:     ${{ steps.msgid.outputs.last_id }}
          MSG_EXISTS:      ${{ steps.msgid.outputs.exists }}
          STATUS_EMOJI:    ${{ steps.status.outputs.emoji }}
          STATUS_LABEL:    ${{ steps.status.outputs.label }}
          STATUS_TITLE:    ${{ steps.status.outputs.title }}
          STATUS_COLOR:    ${{ steps.status.outputs.color }}
        run: |
          SHORT_SHA="${FULL_SHA:0:7}"
          COMMIT_TITLE=$(echo "$COMMIT_MSG" | head -n1)
          LAST_UPDATE=$(date -u +"%a, %d %b %Y · %H:%M UTC")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          AUTHOR_LINE="${AUTHOR}  <:author_wf:1498988538228637837>  ${REPO}  ⎇  ${BRANCH}"

          printf '%s' "$FILES_COL1" > /tmp/col1.txt
          printf '%s' "$FILES_COL2" > /tmp/col2.txt
          COL2_CONTENT=$(cat /tmp/col2.txt)

          if [ -n "$COL2_CONTENT" ]; then
            FILES_FIELDS=$(jq -n \
              --rawfile c1 /tmp/col1.txt \
              --rawfile c2 /tmp/col2.txt \
              '[
                {name: "<:changed:1498988528699183114>  Col 1", value: ("```\n" + ($c1 | rtrimstr("\n")) + "\n```"), inline: true},
                {name: "<:changed:1498988528699183114>  Col 2", value: ("```\n" + ($c2 | rtrimstr("\n")) + "\n```"), inline: true}
              ]')
          else
            FILES_FIELDS=$(jq -n \
              --rawfile c1 /tmp/col1.txt \
              '[
                {name: "<:changed:1498988528699183114>  Changed Files", value: ("```\n" + ($c1 | rtrimstr("\n")) + "\n```"), inline: false}
              ]')
          fi

          jq -n \
            --arg title       "$STATUS_TITLE" \
            --arg color       "$STATUS_COLOR" \
            --arg repo        "$REPO" \
            --arg url         "$COMPARE_URL" \
            --arg authorline  "$AUTHOR_LINE" \
            --arg avatar      "$AVATAR" \
            --arg username    "$USERNAME" \
            --arg committitle "$COMMIT_TITLE" \
            --arg branch      "$BRANCH" \
            --arg shortsha    "$SHORT_SHA" \
            --arg commiturl   "$COMMIT_URL" \
            --arg filescount  "$FILES_COUNT" \
            --arg lastupdate  "$LAST_UPDATE" \
            --arg timestamp   "$TIMESTAMP" \
            --arg statusemoji "$STATUS_EMOJI" \
            --arg statuslabel "$STATUS_LABEL" \
            --argjson color   "$STATUS_COLOR" \
            --argjson filefields "$FILES_FIELDS" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                author: {
                  name: $authorline,
                  icon_url: $avatar,
                  url: ("https://github.com/" + $username)
                },
                description: (
                  "**" + $repo + "**  ·  3 jobs passed\n\n" +
                  "> *\"" + $committitle + "\"*"
                ),
                fields: (
                  [
                    {
                      name:   "<:hash:1498988536207114321>  SHA",
                      value:  ("[`" + $shortsha + "`](" + $commiturl + ")"),
                      inline: true
                    },
                    {
                      name:   "<:package:1498988534433054770>  Files",
                      value:  ("**" + $filescount + "** changed"),
                      inline: true
                    },
                    {
                      name:   ($statusemoji + "  Status"),
                      value:  ($statusemoji + "  **" + $statuslabel + "**"),
                      inline: true
                    },
                    {
                      name:   "<a:update:1498988526656688178>  Last Update",
                      value:  ("`" + $lastupdate + "`"),
                      inline: false
                    }
                  ] + $filefields
                ),
                footer: {
                  text:     "Wildfire.ro Docs",
                  icon_url: "https://cdn.discordapp.com/emojis/1481674482526457866.png"
                },
                timestamp: $timestamp
              }]
            }' > /tmp/payload.json

          # ── Send or PATCH ────────────────────────────────────────────────────
          if [ "$MSG_EXISTS" = "true" ] && [ -n "$LAST_MSG_ID" ]; then
            echo "✏️  Editing existing message (ID: $LAST_MSG_ID)..."
            HTTP_CODE=$(curl -s -o /tmp/discord_resp.json -w "%{http_code}" \
              -X PATCH "${DISCORD_WEBHOOK}/messages/${LAST_MSG_ID}?wait=true" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Message edited successfully"
              echo "new_id=$LAST_MSG_ID" >> $GITHUB_OUTPUT
            else
              echo "⚠️  PATCH failed (HTTP $HTTP_CODE) — sending new message..."
              RESPONSE=$(curl -s -X POST "${DISCORD_WEBHOOK}?wait=true" \
                -H "Content-Type: application/json" \
                -d @/tmp/payload.json)
              NEW_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
              echo "✅ New message sent (ID: $NEW_ID)"
              echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
            fi
          else
            echo "📨 First run — sending new message..."
            RESPONSE=$(curl -s -X POST "${DISCORD_WEBHOOK}?wait=true" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json)
            NEW_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            echo "✅ Message sent (ID: $NEW_ID)"
            echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          fi

      # ─── 6. Save message ID to cache ────────────────────────────────────────
      - name: Save message ID to cache
        env:
          NEW_ID:      ${{ steps.discord.outputs.new_id }}
          LAST_MSG_ID: ${{ steps.msgid.outputs.last_id }}
        run: |
          MSG_FILE=".cache/discord_msg_id"
          mkdir -p .cache

          if [ -n "$NEW_ID" ]; then
            if [ "$NEW_ID" != "$LAST_MSG_ID" ]; then
              echo "$NEW_ID" > "$MSG_FILE"
              echo "💾 New message ID cached: $NEW_ID"
            else
              echo "ℹ️  Message ID unchanged — no update needed"
            fi
          else
            echo "⚠️  No message ID to save"
          fi

      # ─── 7. On failure — send/edit with offline status ──────────────────────
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG:      ${{ github.event.head_commit.message }}
          AUTHOR:          ${{ steps.userinfo.outputs.display_name }}
          AVATAR:          ${{ steps.userinfo.outputs.avatar_url }}
          USERNAME:        ${{ steps.userinfo.outputs.username }}
          BRANCH:          ${{ github.ref_name }}
          REPO:            ${{ github.repository }}
          FULL_SHA:        ${{ github.sha }}
          COMMIT_URL:      ${{ github.event.head_commit.url }}
          COMPARE_URL:     ${{ github.event.compare }}
          FILES_COUNT:     ${{ steps.changed.outputs.files_count }}
          LAST_MSG_ID:     ${{ steps.msgid.outputs.last_id }}
          MSG_EXISTS:      ${{ steps.msgid.outputs.exists }}
        run: |
          SHORT_SHA="${FULL_SHA:0:7}"
          COMMIT_TITLE=$(echo "$COMMIT_MSG" | head -n1)
          LAST_UPDATE=$(date -u +"%a, %d %b %Y · %H:%M UTC")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          AUTHOR_LINE="${AUTHOR}  <:author_wf:1498988538228637837>  ${REPO}  ⎇  ${BRANCH}"

          jq -n \
            --arg repo        "$REPO" \
            --arg url         "$COMPARE_URL" \
            --arg authorline  "$AUTHOR_LINE" \
            --arg avatar      "$AVATAR" \
            --arg username    "$USERNAME" \
            --arg committitle "$COMMIT_TITLE" \
            --arg shortsha    "$SHORT_SHA" \
            --arg commiturl   "$COMMIT_URL" \
            --arg filescount  "$FILES_COUNT" \
            --arg lastupdate  "$LAST_UPDATE" \
            --arg timestamp   "$TIMESTAMP" \
            '{
              embeds: [{
                title: "<:offline:1498988530851119246>  Push Failed",
                url: $url,
                color: 15548997,
                author: {
                  name: $authorline,
                  icon_url: $avatar,
                  url: ("https://github.com/" + $username)
                },
                description: (
                  "**" + $repo + "**  ·  workflow failed\n\n" +
                  "> *\"" + $committitle + "\"*"
                ),
                fields: [
                  {
                    name:   "<:hash:1498988536207114321>  SHA",
                    value:  ("[`" + $shortsha + "`](" + $commiturl + ")"),
                    inline: true
                  },
                  {
                    name:   "<:package:1498988534433054770>  Files",
                    value:  ("**" + $filescount + "** changed"),
                    inline: true
                  },
                  {
                    name:   "<:offline:1498988530851119246>  Status",
                    value:  "<:offline:1498988530851119246>  **failed**",
                    inline: true
                  },
                  {
                    name:   "<a:update:1498988526656688178>  Last Update",
                    value:  ("`" + $lastupdate + "`"),
                    inline: false
                  }
                ],
                footer: {
                  text:     "Wildfire.ro Docs",
                  icon_url: "https://cdn.discordapp.com/emojis/1481674482526457866.png"
                },
                timestamp: $timestamp
              }]
            }' > /tmp/payload_fail.json

          if [ "$MSG_EXISTS" = "true" ] && [ -n "$LAST_MSG_ID" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH "${DISCORD_WEBHOOK}/messages/${LAST_MSG_ID}?wait=true" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload_fail.json)
            if [ "$HTTP_CODE" != "200" ]; then
              curl -s -X POST "${DISCORD_WEBHOOK}?wait=true" \
                -H "Content-Type: application/json" \
                -d @/tmp/payload_fail.json
            fi
          else
            curl -s -X POST "${DISCORD_WEBHOOK}?wait=true" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload_fail.json
          fi