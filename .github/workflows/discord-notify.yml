name: Discord Push Notification

on:
  push:
    branches: [ main, develop ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          ALL_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$ALL_FILES" ]; then
            echo "files_count=0" >> $GITHUB_OUTPUT
            echo "files_display=No changes" >> $GITHUB_OUTPUT
          else
            FILES_COUNT=$(echo "$ALL_FILES" | wc -l | tr -d ' ')
            SHOWN=$(echo "$ALL_FILES" | head -30 | awk '{
              line = "• " $0;
              printf "%-38s", line;
              if (NR % 2 == 0) printf "\n";
            }
            END { if (NR % 2 != 0) printf "\n"; }')
            if [ "$FILES_COUNT" -gt 30 ]; then
              EXTRA=$((FILES_COUNT - 30))
              SHOWN=$(printf "%s\n... +%d more files" "$SHOWN" "$EXTRA")
            fi
            echo "files_count=$FILES_COUNT" >> $GITHUB_OUTPUT
            {
              echo "files_display<<ENDOFFILES"
              echo "$SHOWN"
              echo "ENDOFFILES"
            } >> $GITHUB_OUTPUT
          fi

      - name: Get commit stats
        id: stats
        run: |
          STATS=$(git diff --stat HEAD~1 HEAD 2>/dev/null | tail -1)
          ADDITIONS=$(echo "$STATS" | grep -oP '\d+(?= insertion)' || echo "0")
          DELETIONS=$(echo "$STATS" | grep -oP '\d+(?= deletion)' || echo "0")
          echo "additions=${ADDITIONS:-0}" >> $GITHUB_OUTPUT
          echo "deletions=${DELETIONS:-0}" >> $GITHUB_OUTPUT

      - name: Get user info
        id: userinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.event.head_commit.author.username }}"
          [ -z "$USERNAME" ] && USERNAME="${{ github.actor }}"
          [ -z "$USERNAME" ] && USERNAME="${{ github.event.pusher.name }}"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

          if [ -n "$USERNAME" ]; then
            RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/users/$USERNAME" 2>/dev/null || echo "{}")
            AVATAR_URL=$(echo "$RESPONSE" | jq -r '.avatar_url // empty')
            NAME=$(echo "$RESPONSE" | jq -r '.name // empty')

            [ -n "$AVATAR_URL" ] && echo "avatar_url=${AVATAR_URL}&s=80" >> $GITHUB_OUTPUT \
              || echo "avatar_url=https://github.com/${USERNAME}.png?size=80" >> $GITHUB_OUTPUT

            [ -n "$NAME" ] && [ "$NAME" != "null" ] && echo "display_name=$NAME" >> $GITHUB_OUTPUT \
              || echo "display_name=$USERNAME" >> $GITHUB_OUTPUT
          else
            echo "avatar_url=https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" >> $GITHUB_OUTPUT
            echo "display_name=Unknown User" >> $GITHUB_OUTPUT
          fi

      - name: Read last message ID
        id: msgid
        run: |
          MSG_FILE=".github/discord_msg_id"
          if [ -f "$MSG_FILE" ]; then
            LAST_ID=$(cat "$MSG_FILE" | tr -d '[:space:]')
            echo "last_id=$LAST_ID" >> $GITHUB_OUTPUT
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "last_id=" >> $GITHUB_OUTPUT
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Send or edit Discord notification
        id: discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ steps.userinfo.outputs.display_name }}
          AVATAR: ${{ steps.userinfo.outputs.avatar_url }}
          USERNAME: ${{ steps.userinfo.outputs.username }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          FULL_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMPARE_URL: ${{ github.event.compare }}
          FILES_COUNT: ${{ steps.changed.outputs.files_count }}
          FILES_DISPLAY: ${{ steps.changed.outputs.files_display }}
          ADDITIONS: ${{ steps.stats.outputs.additions }}
          DELETIONS: ${{ steps.stats.outputs.deletions }}
          LAST_MSG_ID: ${{ steps.msgid.outputs.last_id }}
          MSG_EXISTS: ${{ steps.msgid.outputs.exists }}
        run: |
          SHORT_SHA="${FULL_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_TITLE=$(echo "$COMMIT_MSG" | head -1)

          printf '%s' "$FILES_DISPLAY" > /tmp/files_list.txt

          jq -n \
            --arg reponame "$REPO" \
            --arg compareurl "$COMPARE_URL" \
            --arg author "$AUTHOR" \
            --arg avatar "$AVATAR" \
            --arg username "$USERNAME" \
            --arg committitle "$COMMIT_TITLE" \
            --arg branch "$BRANCH" \
            --arg shortsha "$SHORT_SHA" \
            --arg commiturl "$COMMIT_URL" \
            --arg filescount "$FILES_COUNT" \
            --arg additions "$ADDITIONS" \
            --arg deletions "$DELETIONS" \
            --rawfile filesraw /tmp/files_list.txt \
            --arg timestamp "$TIMESTAMP" \
            '{
              embeds: [{
                title: ("📚 Last Updated — \($reponame)"),
                url: $compareurl,
                color: 3447003,
                author: {
                  name: $author,
                  icon_url: $avatar,
                  url: ("https://github.com/\($username)")
                },
                fields: [
                  {
                    name: ("📝 \($committitle)"),
                    value: ("[`\($shortsha)`](\($commiturl)) on 🌿 `\($branch)`"),
                    inline: false
                  },
                  {
                    name: "📊 Changes",
                    value: ("📦 **\($filescount)** files  •  🟢 **+\($additions)**  •  🔴 **−\($deletions)**"),
                    inline: false
                  },
                  {
                    name: "📁 Modified Files",
                    value: ("```\n\($filesraw)\n```"),
                    inline: false
                  }
                ],
                footer: {
                  text: "Wildfire Docs",
                  icon_url: "https://github.com/WildFiire.png?size=32"
                },
                timestamp: $timestamp
              }]
            }' > /tmp/payload.json

          if [ "$MSG_EXISTS" = "true" ] && [ -n "$LAST_MSG_ID" ]; then
            RESPONSE=$(curl -s -o /tmp/discord_resp.json -w "%{http_code}" \
              -X PATCH "${DISCORD_WEBHOOK}/messages/${LAST_MSG_ID}" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json)

            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Message edited: $LAST_MSG_ID"
              echo "new_id=$LAST_MSG_ID" >> $GITHUB_OUTPUT
            else
              echo "⚠️  Edit failed (HTTP $RESPONSE), sending new message..."
              RESPONSE=$(curl -s -o /tmp/discord_resp.json -w "%{http_code}" \
                -X POST "${DISCORD_WEBHOOK}?wait=true" \
                -H "Content-Type: application/json" \
                -d @/tmp/payload.json)
              NEW_ID=$(jq -r '.id // empty' /tmp/discord_resp.json)
              echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
            fi
          else
            echo "🆕 First run — sending new message..."
            RESPONSE=$(curl -s -o /tmp/discord_resp.json -w "%{http_code}" \
              -X POST "${DISCORD_WEBHOOK}?wait=true" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json)
            NEW_ID=$(jq -r '.id // empty' /tmp/discord_resp.json)
            echo "✅ New message: $NEW_ID"
            echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          fi

      - name: Save message ID to repo
        if: success()
        env:
          NEW_ID: ${{ steps.discord.outputs.new_id }}
        run: |
          MSG_FILE=".github/discord_msg_id"
          if [ -n "$NEW_ID" ]; then
            echo "$NEW_ID" > "$MSG_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$MSG_FILE"
            git diff --staged --quiet || git commit -m "chore: update discord message id [skip ci]"
            git push origin HEAD
          fi