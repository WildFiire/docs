name: Deploy Monitor

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy status on VPS
        id: check
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/wiki
            git pull origin main
            npm install
            npm run docs:build
            echo "SUCCESS"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_LOGS_WEBHOOK }}
        run: |
          if [ "${{ steps.check.outcome }}" == "success" ]; then
            STATUS="success"
            COLOR="3066993"
            TITLE="✅ Deploy Reușit"
            DESCRIPTION="Deploy-ul pe VPS s-a realizat cu succes"
          else
            STATUS="failure"
            COLOR="15158332"
            TITLE="❌ Deploy Eșuat"
            DESCRIPTION="Deploy-ul pe VPS a eșuat. Verifică log-urile în GitHub Actions."
          fi

          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"description\": \"$DESCRIPTION\",
                \"fields\": [
                  {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"📝 Commit\", \"value\": \"${{ github.sha }}\", \"inline\": true},
                  {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"📁 Status\", \"value\": \"$STATUS\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"Wildfire.ro Deploy Monitor\"},
                \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
              }]
            }"