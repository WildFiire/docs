name: 📢 Discord Logs - VitePress

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📂 Get changed files
        id: files
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD)
          COUNT=$(echo "$FILES" | wc -l)
          
          if [ $COUNT -le 100 ]; then
            LIST=$(echo "$FILES" | sed 's/^/• /')
          else
            LIST=$(echo "$FILES" | head -100 | sed 's/^/• /')
            LIST="$LIST\n• ... și $((COUNT - 100)) fișiere"
          fi
          
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: 📜 Get last commits
        id: commits
        run: |
          LOG=$(git log -5 --pretty=format:"%h - %s (%an)")
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🔨 Install dependencies
        run: npm ci

      - name: 🏗️ Build VitePress
        id: build
        continue-on-error: true
        run: |
          npm run docs:build 2>&1 | tee build.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          
          if [ $? -ne 0 ]; then
            ERRORS=$(grep -E "error|Error|ERROR|failed|Failed" build.log | tail -30 | sed 's/"/\\"/g')
            echo "errors<<EOF" >> $GITHUB_OUTPUT
            echo "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            FIRST_ERROR=$(grep -E "error|Error|ERROR" build.log | head -1 | sed 's/"/\\"/g')
            echo "first_error=$FIRST_ERROR" >> $GITHUB_OUTPUT
          fi

      - name: 💬 Get commit message
        id: commit
        run: |
          MSG="${{ github.event.head_commit.message }}"
          MSG=$(echo "$MSG" | head -n1 | sed 's/"/\\"/g')
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: 📢 Send to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_LOGS_WEBHOOK }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          AUTHOR="${{ github.actor }}"
          COMMIT_MSG="${{ steps.commit.outputs.message }}"
          COMMIT_LOG="${{ steps.commits.outputs.log }}"
          FILES_LIST="${{ steps.files.outputs.list }}"
          FILES_COUNT="${{ steps.files.outputs.count }}"
          BUILD_EXIT="${{ steps.build.outputs.exit_code }}"
          BUILD_ERROR="${{ steps.build.outputs.first_error }}"
          FULL_ERRORS="${{ steps.build.outputs.errors }}"
          
          if [ "$BUILD_EXIT" == "0" ]; then
            STATUS="✅ BUILD SUCCESS"
            COLOR="3066993"
            TITLE="✅ Build Reușit - $REPO"
            DESCRIPTION="**Build-ul VitePress a fost realizat cu succes!**\n\n📦 **Repository:** $REPO\n🌿 **Branch:** $BRANCH\n👤 **Author:** $AUTHOR\n📝 **Commit:** [`$SHORT_SHA`](https://github.com/$REPO/commit/$COMMIT_SHA)"
          else
            STATUS="❌ BUILD FAILED"
            COLOR="15158332"
            TITLE="❌ Build Eșuat - $REPO"
            DESCRIPTION="**Build-ul VitePress a eșuat!**\n\n📦 **Repository:** $REPO\n🌿 **Branch:** $BRANCH\n👤 **Author:** $AUTHOR\n📝 **Commit:** [`$SHORT_SHA`](https://github.com/$REPO/commit/$COMMIT_SHA)\n\n**🔴 Eroare:**\n```\n$BUILD_ERROR\n```"
          fi
          
          jq -n \
            --arg title "$TITLE" \
            --arg color "$COLOR" \
            --arg status "$STATUS" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg commit_sha "[$SHORT_SHA](https://github.com/$REPO/commit/$COMMIT_SHA)" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg timestamp "$TIMESTAMP" \
            --arg commit_log "$COMMIT_LOG" \
            --arg files_list "$FILES_LIST" \
            --arg files_count "$FILES_COUNT" \
            --arg description "$DESCRIPTION" \
            --arg full_errors "${FULL_ERRORS:0:1900}" \
            --arg build_exit "$BUILD_EXIT" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                description: $description,
                fields: [
                  {
                    name: "💬 Commit Message",
                    value: ($commit_msg[0:100] | if length > 100 then . + "..." else . end),
                    inline: false
                  },
                  {
                    name: "📜 Last 5 Commits",
                    value: "```\n" + $commit_log + "\n```",
                    inline: false
                  },
                  {
                    name: "📁 Changed Files (" + $files_count + ")",
                    value: "```\n" + $files_list + "\n```",
                    inline: false
                  }
                ] + (if $build_exit != "0" then [{
                  name: "🔍 Detailed Errors",
                  value: "```\n" + $full_errors + "\n```",
                  inline: false
                }] else [] end),
                footer: {
                  text: "VitePress Build • " + $status,
                  icon_url: "https://vitepress.dev/vitepress-logo-large.png"
                },
                timestamp: $timestamp
              }]
            }' | curl -s -X POST "$WEBHOOK" -H "Content-Type: application/json" -d @-