name: VPS Deploy Monitor

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        id: deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/wiki
            git pull origin main
            npm install
            npm run docs:build
            echo "DEPLOY_SUCCESS"

      - name: Send Discord result
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_LOGS_WEBHOOK }}
        run: |
          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            TITLE="✅ Deploy Reușit"
            COLOR="3066993"
            DESC="Build-ul și deploy-ul pe VPS s-au realizat cu succes"
            STATUS="SUCCESS"
          else
            TITLE="❌ Deploy Eșuat"
            COLOR="15158332"
            DESC="Build-ul sau deploy-ul pe VPS a eșuat"
            STATUS="FAILED"
          fi

          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"description\": \"$DESC\",
                \"fields\": [
                  {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"📝 Commit\", \"value\": \"\`${{ github.sha }}\`\", \"inline\": true},
                  {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"📊 Status\", \"value\": \"$STATUS\", \"inline\": true},
                  {\"name\": \"🕐 Time\", \"value\": \"$(date '+%Y-%m-%d %H:%M:%S')\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"Wildfire.ro VPS Deploy\"}
              }]
            }"