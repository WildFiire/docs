name: Build Test & Discord Notify

on:
  push:
    branches: [ main, develop ]

jobs:
  build_and_notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ─── 1. Changed files ───────────────────────────────────────────────────
      - name: Get changed files
        id: changed
        run: |
          ALL_STATUS=$(git diff --name-status HEAD~1 HEAD 2>/dev/null || echo "")

          if [ -z "$ALL_STATUS" ]; then
            FILES_COUNT=0; ADDED=0; MODIFIED=0; DELETED=0; COL1="No changes detected"; COL2=""
          else
            FILES_COUNT=$(echo "$ALL_STATUS" | wc -l | tr -d ' ')
            ADDED=$(echo "$ALL_STATUS"   | awk '$1 == "A"' | wc -l | tr -d ' ')
            MODIFIED=$(echo "$ALL_STATUS" | awk '$1 == "M"' | wc -l | tr -d ' ')
            DELETED=$(echo "$ALL_STATUS"  | awk '$1 == "D"' | wc -l | tr -d ' ')
            RENAMED=$(echo "$ALL_STATUS"  | awk '$1 ~ /^R/' | wc -l | tr -d ' ')
            MODIFIED=$((MODIFIED + RENAMED))

            ALL_FILES=$(echo "$ALL_STATUS" | awk '{print $NF}')
            SHOWN=$(echo "$ALL_FILES" | head -8)
            SHOWN_COUNT=$(echo "$SHOWN" | wc -l | tr -d ' ')
            EXTRA=$((FILES_COUNT - SHOWN_COUNT))

            COL1=$(echo "$SHOWN" | head -4 | sed 's/^/• /')
            COL2_RAW=$(echo "$SHOWN" | tail -n +5 | head -4 | sed 's/^/• /')

            if [ "$EXTRA" -gt 0 ]; then
              if [ -n "$COL2_RAW" ]; then COL2=$(printf "%s\n+%d more…" "$COL2_RAW" "$EXTRA")
              else COL2=$(printf "+%d more…" "$EXTRA"); fi
            else
              COL2="$COL2_RAW"
            fi
          fi

          echo "files_count=$FILES_COUNT" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT
          { echo "col1<<ENDCOL1"; echo "$COL1"; echo "ENDCOL1"; } >> $GITHUB_OUTPUT
          { echo "col2<<ENDCOL2"; echo "$COL2"; echo "ENDCOL2"; } >> $GITHUB_OUTPUT

      # ─── 2. Author info ─────────────────────────────────────────────────────
      - name: Get user info
        id: userinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.event.head_commit.author.username }}"
          [ -z "$USERNAME" ] && USERNAME="${{ github.actor }}"
          [ -z "$USERNAME" ] && USERNAME="${{ github.event.pusher.name }}"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

          if [ -n "$USERNAME" ]; then
            RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/users/$USERNAME" 2>/dev/null || echo "{}")
            AVATAR_URL=$(echo "$RESPONSE" | jq -r '.avatar_url // empty')
            NAME=$(echo "$RESPONSE"      | jq -r '.name // empty')

            if [ -n "$AVATAR_URL" ]; then echo "avatar_url=${AVATAR_URL}&s=128" >> $GITHUB_OUTPUT
            else echo "avatar_url=https://github.com/${USERNAME}.png?size=128" >> $GITHUB_OUTPUT; fi

            if [ -n "$NAME" ] && [ "$NAME" != "null" ]; then echo "display_name=$NAME" >> $GITHUB_OUTPUT
            else echo "display_name=$USERNAME" >> $GITHUB_OUTPUT; fi
          else
            echo "avatar_url=https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" >> $GITHUB_OUTPUT
            echo "display_name=Unknown User" >> $GITHUB_OUTPUT
          fi

      # ─── 3. Run Build & Capture Logs ────────────────────────────────────────
      - name: Install & Build
        id: build_step
        continue-on-error: true
        run: |
          echo "VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}" > .env
          npm install --include=dev > build.log 2>&1
          npm run docs:build >> build.log 2>&1

      # ─── 4. Restore message IDs from cache ──────────────────────────────────
      - name: Restore message IDs from cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: discord-msg-ids-${{ github.ref_name }}-v3
          restore-keys: |
            discord-msg-ids-${{ github.ref_name }}-

      - name: Read last message IDs
        id: msgids
        run: |
          mkdir -p .cache
          [ -f .cache/id_main ] && MAIN=$(cat .cache/id_main | tr -d '[:space:]') || MAIN=""
          [ -f .cache/id_logs ] && LOGS=$(cat .cache/id_logs | tr -d '[:space:]') || LOGS=""
          echo "id_main=$MAIN" >> $GITHUB_OUTPUT
          echo "id_logs=$LOGS" >> $GITHUB_OUTPUT

      # ─── 5. Build payload & Send to BOTH Webhooks ───────────────────────────
      - name: Send Discord Notifications
        env:
          WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_LOGS: ${{ secrets.DISCORD_DEPLOY_LOGS }}
          LAST_ID_MAIN: ${{ steps.msgids.outputs.id_main }}
          LAST_ID_LOGS: ${{ steps.msgids.outputs.id_logs }}
          COMMIT_MSG:   ${{ github.event.head_commit.message }}
          AUTHOR:       ${{ steps.userinfo.outputs.display_name }}
          AVATAR:       ${{ steps.userinfo.outputs.avatar_url }}
          USERNAME:     ${{ steps.userinfo.outputs.username }}
          BRANCH:       ${{ github.ref_name }}
          REPO:         ${{ github.repository }}
          FULL_SHA:     ${{ github.sha }}
          COMMIT_URL:   ${{ github.event.head_commit.url }}
          COMPARE_URL:  ${{ github.event.compare }}
          FILES_COUNT:  ${{ steps.changed.outputs.files_count }}
          FILES_ADDED:  ${{ steps.changed.outputs.added }}
          FILES_MOD:    ${{ steps.changed.outputs.modified }}
          FILES_DEL:    ${{ steps.changed.outputs.deleted }}
          FILES_COL1:   ${{ steps.changed.outputs.col1 }}
          FILES_COL2:   ${{ steps.changed.outputs.col2 }}
          BUILD_OUTCOME: ${{ steps.build_step.outcome }}
        run: |
          SHORT_SHA="${FULL_SHA:0:7}"
          COMMIT_TITLE=$(echo "$COMMIT_MSG" | head -n1)
          LAST_UPDATE=$(date -u +"%a, %d %b %Y · %H:%M UTC")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          AUTHOR_LINE="${AUTHOR}  ·  pushed to  ${BRANCH}"
          FOOTER_STATS="Wildfire.ro Docs  ·  ${REPO}     +${FILES_ADDED} added  ~${FILES_MOD} modified  -${FILES_DEL} deleted"

          printf '%s' "$FILES_COL1" > /tmp/col1.txt
          printf '%s' "$FILES_COL2" > /tmp/col2.txt
          COL2_CONTENT=$(cat /tmp/col2.txt)

          if [ -n "$COL2_CONTENT" ]; then
            FILES_FIELDS=$(jq -n --rawfile c1 /tmp/col1.txt --rawfile c2 /tmp/col2.txt '[{name: "Col 1", value: ("```\n" + ($c1 | rtrimstr("\n")) + "\n```"), inline: true}, {name: "Col 2", value: ("```\n" + ($c2 | rtrimstr("\n")) + "\n```"), inline: true}]')
          else
            FILES_FIELDS=$(jq -n --rawfile c1 /tmp/col1.txt '[{name: "Files", value: ("```\n" + ($c1 | rtrimstr("\n")) + "\n```"), inline: false}]')
          fi

          # DACA BUILD-UL E SUCCES
          if [ "$BUILD_OUTCOME" == "success" ]; then
            jq -n \
              --arg repo "$REPO" \
              --arg url "$COMPARE_URL" \
              --arg authorline "$AUTHOR_LINE" \
              --arg avatar "$AVATAR" \
              --arg username "$USERNAME" \
              --arg committitle "$COMMIT_TITLE" \
              --arg shortsha "$SHORT_SHA" \
              --arg commiturl "$COMMIT_URL" \
              --arg filescount "$FILES_COUNT" \
              --arg lastupdate "$LAST_UPDATE" \
              --arg timestamp "$TIMESTAMP" \
              --arg footerstats "$FOOTER_STATS" \
              --argjson filefields "$FILES_FIELDS" \
              '{
                embeds: [{
                  title: "<:verificat_orange:1498988540472721408>  Push & Build Successful",
                  url: $url,
                  color: 16351248,
                  author: { name: $authorline, icon_url: $avatar, url: ("https://github.com/" + $username) },
                  description: ("-# <:wf3:1481674482526457866>  **" + $repo + "**\n\n> *\"" + $committitle + "\"*"),
                  fields: (
                    [
                      { name: "<:hash:1498988536207114321>  SHA", value: ("[`" + $shortsha + "`](" + $commiturl + ")"), inline: true },
                      { name: "<:package:1498988534433054770>  Files", value: ("**" + $filescount + "** changed"), inline: true },
                      { name: "<:online:1498988532629373030>  Status", value: "<:online:1498988532629373030>  **ONLINE**", inline: true },
                      { name: "<a:update:1498988526656688178>  Last Update", value: ("`" + $lastupdate + "`"), inline: false },
                      { name: "<:changed:1498988528699183114>  Changed Files", value: "** **", inline: false }
                    ] + $filefields
                  ),
                  footer: { text: $footerstats, icon_url: "https://cdn.discordapp.com/emojis/1481674482526457866.png" },
                  timestamp: $timestamp
                }]
              }' > /tmp/payload.json
          
          # DACA BUILD-UL E FAIL (Includem logurile)
          else
            ERRORS=$(tail -n 15 build.log)
            jq -n \
              --arg repo "$REPO" \
              --arg url "$COMPARE_URL" \
              --arg authorline "$AUTHOR_LINE" \
              --arg avatar "$AVATAR" \
              --arg username "$USERNAME" \
              --arg committitle "$COMMIT_TITLE" \
              --arg shortsha "$SHORT_SHA" \
              --arg commiturl "$COMMIT_URL" \
              --arg filescount "$FILES_COUNT" \
              --arg lastupdate "$LAST_UPDATE" \
              --arg timestamp "$TIMESTAMP" \
              --arg footerstats "$FOOTER_STATS" \
              --arg errors "$ERRORS" \
              --argjson filefields "$FILES_FIELDS" \
              '{
                embeds: [{
                  title: "<:offline:1498988530851119246>  Build Failed",
                  url: $url,
                  color: 15548997,
                  author: { name: $authorline, icon_url: $avatar, url: ("https://github.com/" + $username) },
                  description: ("-# <:wf3:1481674482526457866>  **" + $repo + "**\n\n> *\"" + $committitle + "\"*\n\n**<:offline:1498988530851119246> Eroare (ultimele linii):**\n```js\n" + $errors + "\n```"),
                  fields: (
                    [
                      { name: "<:hash:1498988536207114321>  SHA", value: ("[`" + $shortsha + "`](" + $commiturl + ")"), inline: true },
                      { name: "<:package:1498988534433054770>  Files", value: ("**" + $filescount + "** changed"), inline: true },
                      { name: "<:offline:1498988530851119246>  Status", value: "<:offline:1498988530851119246>  **FAILED**", inline: true },
                      { name: "<a:update:1498988526656688178>  Last Update", value: ("`" + $lastupdate + "`"), inline: false },
                      { name: "<:changed:1498988528699183114>  Changed Files", value: "** **", inline: false }
                    ] + $filefields
                  ),
                  footer: { text: $footerstats, icon_url: "https://cdn.discordapp.com/emojis/1481674482526457866.png" },
                  timestamp: $timestamp
                }]
              }' > /tmp/payload.json
          fi

          # Funcție de trimitere către un Webhook specific
          send_webhook() {
            local WEBHOOK_URL=$1
            local LAST_ID=$2
            local CACHE_FILE=$3

            if [ -z "$WEBHOOK_URL" ]; then 
              echo "⚠️ Webhook lipsă pentru $CACHE_FILE, se sare peste."
              return
            fi

            if [ -n "$LAST_ID" ]; then
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH "${WEBHOOK_URL}/messages/${LAST_ID}?wait=true" -H "Content-Type: application/json" -d @/tmp/payload.json)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Mesaj actualizat (ID: $LAST_ID)"
                echo "$LAST_ID" > "$CACHE_FILE"
                return
              fi
            fi

            RESPONSE=$(curl -s -X POST "${WEBHOOK_URL}?wait=true" -H "Content-Type: application/json" -d @/tmp/payload.json)
            NEW_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            if [ -n "$NEW_ID" ] && [ "$NEW_ID" != "null" ]; then
              echo "✅ Mesaj nou trimis (ID: $NEW_ID)"
              echo "$NEW_ID" > "$CACHE_FILE"
            fi
          }

          # Trimitem către ambele webhook-uri
          send_webhook "$WEBHOOK_MAIN" "$LAST_ID_MAIN" ".cache/id_main"
          send_webhook "$WEBHOOK_LOGS" "$LAST_ID_LOGS" ".cache/id_logs"

      # ─── 6. Fail the workflow if build failed ───────────────────────────────
      - name: Fail the workflow if build failed
        if: steps.build_step.outcome != 'success'
        run: exit 1