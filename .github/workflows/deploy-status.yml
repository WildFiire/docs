name: Test Build & Discord Logs

on:
  push:
    branches:
      - main
      - develop # Poți pune și alte branch-uri aici ca să testezi înainte să dai merge

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ─── 1. Trecem prin pașii de build și salvăm output-ul ─────────
      # Folosim continue-on-error: true ca să nu oprească workflow-ul dacă crapă.
      # Vrem să meargă mai departe ca să putem trimite eroarea pe Discord!
      - name: Install & Build
        id: build_step
        continue-on-error: true
        run: |
          # Creăm un .env fals ca să nu crape dacă ai nevoie de el la build
          echo "VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}" > .env
          
          # Rulăm install și build. Orice text apare pe ecran e trimis în "build.log"
          npm install --include=dev > build.log 2>&1
          npm run docs:build >> build.log 2>&1

      # ─── 2. Trimitem rezultatul pe Discord ─────────────────────────
      - name: Send Logs to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_LOGS }}
          REPO: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          COMMIT_TITLE=$(echo "$COMMIT_MSG" | head -n1)
          
          # Verificăm dacă pasul de build a avut succes sau nu
          if [ "${{ steps.build_step.outcome }}" == "success" ]; then
            # DACA A MERS BINE
            jq -n \
              --arg repo "$REPO" \
              --arg title "$COMMIT_TITLE" \
              --arg url "$COMMIT_URL" \
              '{
                embeds: [{
                  title: "✅ Build Tested Successfully",
                  url: $url,
                  color: 5763719,
                  description: ("**" + $repo + "**\n> *" + $title + "*")
                }]
              }' > payload.json
          else
            # DACA A CRAPAT
            # Luăm ultimele 15 linii din log-ul de eroare ca să încapă în Discord
            ERRORS=$(tail -n 15 build.log)
            
            jq -n \
              --arg repo "$REPO" \
              --arg title "$COMMIT_TITLE" \
              --arg url "$COMMIT_URL" \
              --arg errors "$ERRORS" \
              '{
                embeds: [{
                  title: "❌ Build Failed",
                  url: $url,
                  color: 15548997,
                  description: ("**" + $repo + "**\n> *" + $title + "*\n\n**Eroare (ultimele linii):**\n```js\n" + $errors + "\n```")
                }]
              }' > payload.json
          fi

          # Trimitem payload-ul JSON către Discord
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @payload.json

      # ─── 3. Marcăm GitHub Action-ul ca Failed dacă e cazul ─────────
      # Dacă build-ul a picat, forțăm GitHub să arate un "X" roșu la final.
      - name: Fail the workflow if build failed
        if: steps.build_step.outcome != 'success'
        run: exit 1