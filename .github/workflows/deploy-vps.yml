name: Deploy DOCS to VPS

on:
  push:
    branches:
      - main # Trigger deployment when pushing to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}       # Your VPS IP or domain
          username: ${{ secrets.VPS_USER }}   # e.g., root or ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}     # A private SSH key for authentication
          script: |
            # Navigate to the project directory
            cd /var/www/wiki
            
            # Pull the latest changes from the main branch
            git fetch --all
            git reset --hard origin/main
            
            # Install dependencies
            npm install
            
            # Build the static VitePress files
            npm run docs:build
            
            # Optional: Restart any web servers if necessary (though Nginx serves dist automatically)
            # sudo systemctl reload nginx
