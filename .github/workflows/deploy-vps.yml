name: Deploy DOCS to VPS

on:
  push:
    branches:
      - main # Trigger deployment when pushing to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}       # Your VPS IP or domain
          username: ${{ secrets.VPS_USER }}   # e.g., root or ubuntu
          password: ${{ secrets.VPS_PASSWORD }} # A private SSH password for authentication
          script: |
            # Navigate to the project directory
            cd /var/www/wiki
            
            # Pull the latest changes from the main branch
            git fetch --all
            git reset --hard origin/main
            
            # Install dependencies
            npm install
            
            # Create the .env file with the GitHub Token
            echo "VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}" > .env
            
            # Build the static VitePress files
            npm run docs:build
            
            # Apply Nginx cache headers config if not already included
            NGINX_CONF="/etc/nginx/conf.d/wiki-cache.conf"
            if [ ! -f "$NGINX_CONF" ] || ! diff -q /var/www/wiki/nginx-cache.conf "$NGINX_CONF" > /dev/null 2>&1; then
              sudo cp /var/www/wiki/nginx-cache.conf "$NGINX_CONF"
              sudo nginx -t && sudo systemctl reload nginx
            fi
