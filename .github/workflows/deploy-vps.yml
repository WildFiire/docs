name: Deploy DOCS to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        id: deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/wiki
            git fetch --all
            git reset --hard origin/main
            npm install
            echo "VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}" > .env
            npm run docs:build
            echo "DEPLOY_SUCCESS"

      - name: Send Discord - Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_LOGS_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Deploy Reușit",
                "color": 3066993,
                "description": "Site-ul a fost deploy-uit cu succes pe VPS",
                "fields": [
                  {"name": "🌿 Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "📝 Commit", "value": "'"${{ github.sha }}"'", "inline": true},
                  {"name": "👤 Author", "value": "${{ github.actor }}", "inline": true},
                  {"name": "📁 Repository", "value": "${{ github.repository }}", "inline": true}
                ],
                "timestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
              }]
            }'

      - name: Send Discord - Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_LOGS_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Deploy Eșuat",
                "color": 15158332,
                "description": "Deploy-ul pe VPS a eșuat. Verifică log-urile în GitHub Actions",
                "fields": [
                  {"name": "🌿 Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "📝 Commit", "value": "'"${{ github.sha }}"'", "inline": true},
                  {"name": "👤 Author", "value": "${{ github.actor }}", "inline": true},
                  {"name": "📁 Repository", "value": "${{ github.repository }}", "inline": true}
                ],
                "timestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
              }]
            }'